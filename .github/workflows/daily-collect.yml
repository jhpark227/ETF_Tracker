name: Daily ETF Collect & Telegram Briefing

on:
  schedule:
    # 월~금 KST 09:30 = UTC 00:30
    - cron: "30 0 * * 1-5"
  workflow_dispatch: # 수동 실행 가능

permissions:
  contents: write

jobs:
  collect-and-notify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Calculate previous business day
        id: date
        run: |
          YESTERDAY=$(uv run python -c "
          from datetime import date, timedelta
          d = date.today() - timedelta(days=1)
          while d.weekday() >= 5:
              d -= timedelta(days=1)
          print(d.strftime('%Y-%m-%d'))
          ")
          echo "date=$YESTERDAY" >> "$GITHUB_OUTPUT"

      - name: Collect ETF data
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
        run: |
          uv run etf-analyzer collect --date "${{ steps.date.outputs.date }}"

      - name: Send Telegram briefing
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          uv run python -c "
          from etf_analyzer.config import load_config
          from etf_analyzer.storage.db import get_connection
          from etf_analyzer.notifier import build_cross_window_report, send_telegram

          config = load_config()
          conn = get_connection(config.database.path)

          text = build_cross_window_report(conn, config, windows=[3, 5, 10], top=10)
          ok = send_telegram(text)
          print(f'Telegram: {\"OK\" if ok else \"FAIL\"}')
          if not ok:
              raise SystemExit(1)

          conn.close()
          "

      - name: Commit updated DuckDB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/etf_analyzer.duckdb
          git diff --cached --quiet || git commit -m "data: collect ${{ steps.date.outputs.date }}"
          git push
